<!DOCTYPE html>
<html>
<head>
    <title>Business ERP - Inventory & Profit</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; }

        nav {
            width: 220px;
            background: #2c3e50;
            color: white;
            height: 100vh;
            padding: 20px;
            position: fixed;
        }

        nav button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #34495e;
            border: none;
            color: white;
            cursor: pointer;
        }

        .main-content {
            margin-left: 260px;
            padding: 30px;
            width: 100%;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 6px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        .save-btn {
            background: green;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
        }
    </style>
</head>
<body>
<nav>
    <button onclick="showTab('dashboard')">Dashboard</button>
    <button onclick="showTab('transactions')">Daily Entry</button>
    <button onclick="showTab('settings')">Settings</button>
</nav>

<div class="main-content">

<div id="dashboard" class="tab-content active">
    <h2>Dashboard</h2>

    <canvas id="profitChart"></canvas>

    <h3>Today's Profit</h3>
    <h2 id="day-total-display">KES 0</h2>

    <div id="history-table"></div>
</div>
<div id="transactions" class="tab-content">
    <h2>Daily Entry</h2>

    <select id="trans_item"></select>

    <input type="number" id="qty_bought" placeholder="Bought">
    <input type="number" id="qty_sold" placeholder="Sold" oninput="calcPreview()">
    <input type="number" id="daily_exp" placeholder="Expenses" oninput="calcPreview()">

    <div id="preview"></div>

    <button class="save-btn" onclick="saveTransaction()">Save</button>

    <input type="hidden" id="edit_id">
</div>

<div id="settings" class="tab-content">
    <h2>Settings</h2>

    <label>Labour Cost</label>
    <input type="number" id="labour_cost" value="350">

    <button onclick="updateSettings()">Save Settings</button>
</div>

</div> <!-- END main -->

<script>
const SB_URL = "YOUR_URL";
const SB_KEY = "YOUR_KEY";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let currentConfig = {};
let globalLabour = 350;

// TABS
function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(tab).classList.add('active');

    if (tab === "dashboard") {
        loadHistory();
        loadAnalytics();
    }
}

async function loadConfig() {
    const { data } = await _supabase.from('inventory_settings').select('*');

    let options = "";

    data.forEach(item => {
        currentConfig[item.id] = item;
        globalLabour = item.labour_cost || 350;
        options += `<option value="${item.id}">${item.id}</option>`;
    });

    document.getElementById('trans_item').innerHTML = options;
    document.getElementById('labour_cost').value = globalLabour;
}

async function updateSettings() {
    const lab = document.getElementById('labour_cost').value;

    for (let key in currentConfig) {
        await _supabase.from('inventory_settings').upsert({
            id: key,
            ...currentConfig[key],
            labour_cost: lab
        });
    }

    alert("Updated");
    loadConfig();
}

function calcPreview() {
    const item = trans_item.value;
    if (!currentConfig[item]) return;

    const sold = parseFloat(qty_sold.value) || 0;
    const exp = parseFloat(daily_exp.value) || 0;

    const config = currentConfig[item];

    const sales = sold * config.selling_price;
    const cost = (sold * config.buying_price) + exp + globalLabour;

    preview.innerHTML = `Profit: KES ${(sales - cost).toFixed(2)}`;
}

async function saveTransaction() {
    const record = {
        product_name: trans_item.value,
        qty_sold: parseInt(qty_sold.value) || 0,
        qty_bought: parseInt(qty_bought.value) || 0,
        expenses: parseFloat(daily_exp.value) || 0
    };

    await _supabase.from('daily_records').insert([record]);

    alert("Saved");
    loadHistory();
    loadAnalytics();
}

async function loadHistory() {
    const { data } = await _supabase.from('daily_records').select('*');

    let html = "<table>";

    data.forEach(r => {
        html += `<tr>
            <td>${r.product_name}</td>
            <td>${r.qty_sold}</td>
        </tr>`;
    });

    html += "</table>";
    document.getElementById('history-table').innerHTML = html;
}

async function loadAnalytics() {
    const { data } = await _supabase.from('daily_records').select('*');

    let daily = {};

    data.forEach(r => {
        const d = new Date(r.created_at).toLocaleDateString();

        if (!daily[d]) {
            daily[d] = { sales: 0, buying: 0, exp: 0 };
        }

        const c = currentConfig[r.product_name];

        daily[d].sales += r.qty_sold * c.selling_price;
        daily[d].buying += r.qty_bought * c.buying_price;
        daily[d].exp += r.expenses;
    });

    let labels = [];
    let values = [];

    for (let d in daily) {
        const profit = daily[d].sales - daily[d].buying - daily[d].exp - globalLabour;

        labels.push(d);
        values.push(profit);
    }

    renderChart(labels, values);

    const today = new Date().toLocaleDateString();
    document.getElementById('day-total-display').innerText =
        "KES " + (values[labels.indexOf(today)] || 0);
}

let chart;

function renderChart(labels, values) {
    const ctx = document.getElementById('profitChart');

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                data: values
            }]
        }
    });
}

window.onload = async () => {
    await loadConfig();
    loadHistory();
};
</script>

</body>
</html>
