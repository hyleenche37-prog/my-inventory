<!DOCTYPE html>
<html>
<head>
    <title>Business ERP - Inventory & Profit</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        nav { width: 220px; background: #2c3e50; color: white; height: 100vh; padding: 20px; position: fixed; }
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 300px); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        nav button { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #34495e; border: none; color: white; cursor: pointer; }

        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; }

        .save-btn { background: #27ae60; color: white; padding: 12px; border: none; cursor: pointer; width: 100%; }
    </style>
</head>

<body>

<nav>
    <h2>My Inventory</h2>
    <button onclick="showTab('dashboard')">Dashboard</button>
    <button onclick="showTab('transactions')">Daily Entry</button>
    <button onclick="showTab('settings')">Settings</button>
</nav>

<div class="main-content">

    <!-- DASHBOARD -->
    <div id="dashboard" class="tab-content active">
        <h2>Dashboard</h2>
        <canvas id="profitChart"></canvas>
    </div>

    <!-- TRANSACTIONS -->
    <div id="transactions" class="tab-content">
        <h2>Daily Entry</h2>

        <select id="trans_item"></select>

        <input type="number" id="qty_bought" placeholder="Stock Bought">
        <input type="number" id="qty_sold" placeholder="Items Sold">
        <input type="number" id="daily_exp" placeholder="Expenses">

        <div id="preview"></div>

        <button class="save-btn" onclick="saveTransaction()">Save Daily Record</button>
        <input type="hidden" id="edit_id">
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="tab-content">
        <h2>Settings</h2>

        <input type="number" id="labour_cost" placeholder="Labour Cost">

        <button onclick="updateSettings()">Update</button>
    </div>

</div>

<script>
const SB_URL = "https://wnlqacxktltvqrcworoq.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndubHFhY3hrdGx0dnFyY3dvcm9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzMzMzIsImV4cCI6MjA4OTk0OTMzMn0.e2cnyFTBpcxwl4onnBcECSib9pUB4UuEhZ-D7TDG_9A";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let currentConfig = {};
let globalLabour = 350;
let chart = null;

// TABS
function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');

    if(tabId === "dashboard") loadAnalytics();
}

// LOAD CONFIG (ONLY ONE VERSION ✅)
async function loadConfig() {
    const { data } = await _supabase.from('inventory_settings').select('*');

    let dropdown = "";

    if (data) {
        data.forEach(item => {
            currentConfig[item.id] = item;
            dropdown += `<option value="${item.id}">${item.id}</option>`;
            globalLabour = item.labour_cost || 350;
        });
    }

    document.getElementById("trans_item").innerHTML = dropdown;
    document.getElementById("labour_cost").value = globalLabour;
}

// PREVIEW (OPTIONAL)
function calcPreview() {
    const item = document.getElementById("trans_item").value;
    if (!currentConfig[item]) return;

    const sold = Number(document.getElementById("qty_sold").value) || 0;
    const exp = Number(document.getElementById("daily_exp").value) || 0;

    const cfg = currentConfig[item];

    const profit = (sold * cfg.selling_price) - (sold * cfg.buying_price) - exp - globalLabour;

    document.getElementById("preview").innerHTML =
        `<b>Estimated Profit: KES ${profit.toFixed(2)}</b>`;
}

// SAVE
async function saveTransaction() {
    const item = document.getElementById("trans_item").value;
    const sold = Number(document.getElementById("qty_sold").value) || 0;
    const bought = Number(document.getElementById("qty_bought").value) || 0;
    const exp = Number(document.getElementById("daily_exp").value) || 0;

    await _supabase.from('daily_records').insert([{
        product_name: item,
        qty_sold: sold,
        qty_bought: bought,
        expenses: exp
    }]);

    alert("Saved!");
    loadAnalytics();
}

// ✅ EXCEL-STYLE ANALYTICS (MAIN FIX)
async function loadAnalytics() {
    const { data } = await _supabase.from('daily_records').select('*');

    if (!data) return;

    let dailyData = {};

    data.forEach(r => {
        const dateKey = new Date(r.created_at).toLocaleDateString();

        if (!dailyData[dateKey]) {
            dailyData[dateKey] = {
                totalSales: 0,
                totalBuying: 0,
                expenses: 0
            };
        }

        const config = currentConfig[r.product_name] || { buying_price: 0, selling_price: 0 };

        dailyData[dateKey].totalSales += r.qty_sold * config.selling_price;
        dailyData[dateKey].totalBuying += r.qty_bought * config.buying_price;
        dailyData[dateKey].expenses += Number(r.expenses || 0);
    });

    let labels = [];
    let values = [];

    Object.keys(dailyData).forEach(date => {
        const d = dailyData[date];

        const profit = d.totalSales - d.totalBuying - d.expenses - globalLabour;

        labels.push(date);
        values.push(profit);
    });

    renderChart(labels, values);
}

// CHART
function renderChart(labels, values) {
    const ctx = document.getElementById("profitChart").getContext("2d");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Daily Profit",
                data: values
            }]
        }
    });
}

// SETTINGS
function updateSettings() {
    globalLabour = Number(document.getElementById("labour_cost").value) || 350;
    alert("Updated!");
}

// AUTO PREVIEW
document.addEventListener("input", calcPreview);

// INIT
window.onload = async () => {
    await loadConfig();
    loadAnalytics();
};
</script>

</body>
</html>
