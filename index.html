<!DOCTYPE html>

<html>
<head>
    <title>Business ERP - Inventory & Profit</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

```
<style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; }
    nav { width: 220px; background: #2c3e50; color: white; height: 100vh; padding: 20px; position: fixed; }
    .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 300px); }
    .tab-content { display: none; }
    .active { display: block; }
    nav button { width: 100%; padding: 12px; margin-bottom: 10px; background: #34495e; border: none; color: white; cursor: pointer; }
    .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    input, select { width: 100%; padding: 10px; margin: 10px 0; }
    .save-btn { background: #27ae60; color: white; padding: 12px; border: none; width: 100%; cursor: pointer; }
</style>
```

</head>

<body>

<nav>
    <h2>My Inventory</h2>
    <button onclick="showTab('dashboard')">Dashboard</button>
    <button onclick="showTab('transactions')">Daily Entry</button>
    <button onclick="showTab('settings')">Settings</button>
</nav>

<div class="main-content">

<!-- DASHBOARD -->

<div id="dashboard" class="tab-content active">
    <h1>Dashboard</h1>

```
<div class="card"><canvas id="profitChart"></canvas></div>

<div class="card">
    <h3>Today's Profit</h3>
    <h2 id="day-total">KES 0</h2>
</div>

<div class="card">
    <h3>Top Item</h3>
    <h2 id="top-item">---</h2>
</div>

<div class="card" id="history-table"></div>
```

</div>

<!-- TRANSACTIONS -->

<div id="transactions" class="tab-content">
    <h1>Daily Entry</h1>

```
<div class="card">
    <select id="trans_item"></select>
    <input type="number" id="qty_sold" placeholder="Items Sold" oninput="calcPreview()">
    <input type="number" id="daily_exp" placeholder="Expenses" oninput="calcPreview()">

    <div id="preview"></div>

    <button class="save-btn" onclick="saveTransaction()">Save Daily Record</button>
    <input type="hidden" id="edit_id">
</div>
```

</div>

<!-- SETTINGS -->

<div id="settings" class="tab-content">
    <h1>Settings</h1>

```
<div class="card">
    <input type="text" id="new_item_name" placeholder="Product Name">
    <input type="number" id="new_item_bp" placeholder="Buying Price">
    <input type="number" id="new_item_sp" placeholder="Selling Price">
    <button class="save-btn" onclick="addNewProduct()">Add Product</button>
</div>

<div class="card" id="product-settings-list"></div>
```

</div>

</div>

<script>
const SB_URL = 'https://wnlqacxktltvqrcworoq.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndubHFhY3hrdGx0dnFyY3dvcm9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzMzMzIsImV4cCI6MjA4OTk0OTMzMn0.e2cnyFTBpcxwl4onnBcECSib9pUB4UuEhZ-D7TDG_9A';
const db = supabase.createClient(SB_URL, SB_KEY);

let currentConfig = {};
let globalLabour = 350;
let records = [];
let chart = null;

/* NAVIGATION */
function showTab(id){
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id==="dashboard"){ loadAnalytics(); }
}

/* LOAD CONFIG */
async function loadConfig(){
    const { data } = await db.from('inventory_settings').select('*');

    let dropdown = "";
    let html = "<table><tr><th>Product</th><th>BP</th><th>SP</th></tr>";

    currentConfig = {};

    data.forEach(i=>{
        currentConfig[i.id] = i;
        globalLabour = i.labour_cost || 350;

        dropdown += `<option value="${i.id}">${i.id}</option>`;
        html += `<tr><td>${i.id}</td><td>${i.buying_price}</td><td>${i.selling_price}</td></tr>`;
    });

    html += "</table>";

    document.getElementById('trans_item').innerHTML = dropdown;
    document.getElementById('product-settings-list').innerHTML = html;
}

/* PREVIEW */
function calcPreview(){
    const item = document.getElementById('trans_item').value;
    const sold = +document.getElementById('qty_sold').value || 0;
    const exp = +document.getElementById('daily_exp').value || 0;

    const config = currentConfig[item];
    if(!config) return;

    const totalSales = sold * config.selling_price;
    const totalCost = (sold * config.buying_price) + exp + globalLabour;
    const profit = totalSales - totalCost;

    document.getElementById('preview').innerHTML =
        `Profit: KES ${profit.toFixed(2)}`;
}

/* SAVE */
async function saveTransaction(){
    const editId = document.getElementById('edit_id').value;
    const item = document.getElementById('trans_item').value;
    const sold = +document.getElementById('qty_sold').value || 0;
    const exp = +document.getElementById('daily_exp').value || 0;

    const config = currentConfig[item];
    if(!config) return alert("Set prices first");

    const profit = (sold*config.selling_price)-(sold*config.buying_price)-exp-globalLabour;

    if(editId){
        await db.from('daily_records').update({
            product_name:item, qty_sold:sold, expenses:exp, profit_made:profit
        }).eq('id', editId);
    } else {
        await db.from('daily_records').insert({
            product_name:item, qty_sold:sold, expenses:exp, profit_made:profit
        });
    }

    document.getElementById('edit_id').value = "";
    loadHistory();
    loadAnalytics();
}

/* LOAD HISTORY */
async function loadHistory(){
    const { data } = await db.from('daily_records').select('*').order('created_at',{ascending:false});
    records = data;

    let html = "<table><tr><th>Date</th><th>Item</th><th>Profit</th></tr>";

    data.forEach(r=>{
        html += `<tr>
            <td>${new Date(r.created_at).toLocaleDateString()}</td>
            <td>${r.product_name}</td>
            <td>KES ${r.profit_made}</td>
        </tr>`;
    });

    html += "</table>";
    document.getElementById('history-table').innerHTML = html;
}

/* ANALYTICS */
async function loadAnalytics(){
    const { data } = await db.from('daily_records').select('*').order('created_at',{ascending:true});
    if(!data) return;

    let daily = {};
    let itemProfits = {};
    let todayKey = new Date().toLocaleDateString();

    data.forEach(r=>{
        let d = new Date(r.created_at).toLocaleDateString();

        daily[d] = (daily[d]||0)+r.profit_made;
        itemProfits[r.product_name] = (itemProfits[r.product_name]||0)+r.profit_made;
    });

    renderChart(Object.keys(daily), Object.values(daily));

    document.getElementById('day-total').innerText =
        "KES "+(daily[todayKey]||0);

    let top = Object.keys(itemProfits).reduce((a,b)=>itemProfits[a]>itemProfits[b]?a:b,"---");
    document.getElementById('top-item').innerText = top;
}

/* CHART */
function renderChart(labels, values){
    const ctx = document.getElementById('profitChart');
    if(chart) chart.destroy();

    chart = new Chart(ctx,{
        type:'line',
        data:{
            labels:labels,
            datasets:[{label:'Profit',data:values}]
        }
    });
}

/* ADD PRODUCT */
async function addNewProduct(){
    const name = document.getElementById('new_item_name').value.toUpperCase();
    const bp = document.getElementById('new_item_bp').value;
    const sp = document.getElementById('new_item_sp').value;

    if(!name || !bp || !sp) return alert("Fill all");

    await db.from('inventory_settings').insert({
        id:name, buying_price:bp, selling_price:sp, labour_cost:globalLabour
    });

    loadConfig();
}

/* INIT */
window.onload = async ()=>{
    await loadConfig();
    await loadHistory();
    await loadAnalytics();
};
</script>

</body>
</html>
